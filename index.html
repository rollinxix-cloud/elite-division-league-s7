<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eLite Division League S7</title>
    <!-- Ultra-stable Production Tailwind v3 Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        /* COLOR ENGINE BINDINGS */
        :root {
            --bg-main: #f3f4f6;
            --bg-card: #ffffff;
            --border-color: #e5e7eb;
            --text-title: #111827;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --fixture-bg: #f9fafb;
            --fixture-border: #e5e7eb;
            --vs-bg: #e5e7eb;
            --vs-text: #16a34a;
        }

        html.dark, body.dark {
            --bg-main: #0b0f19;
            --bg-card: #111827;
            --border-color: #1f2937;
            --text-title: #ccff00;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --fixture-bg: #1f2937;
            --fixture-border: #374151;
            --vs-bg: #1f2937;
            --vs-text: #a3e635;
        }

        body {
            background-color: var(--bg-main) !important;
            color: var(--text-main) !important;
        }
        .theme-card {
            background-color: var(--bg-card) !important;
            border: 1px solid var(--border-color) !important;
        }
        .main-title {
            color: var(--text-title) !important;
        }
        .text-custom-main {
            color: var(--text-main) !important;
        }
        .text-custom-muted {
            color: var(--text-muted) !important;
        }
        .fixture-row {
            background-color: var(--fixture-bg) !important;
            border: 1px solid var(--fixture-border) !important;
        }
        .vs-badge {
            background-color: var(--vs-bg) !important;
            color: var(--vs-text) !important;
            border: 1px solid var(--fixture-border) !important;
        }
        .admin-glow-bar {
            border: 1px solid #ec4899;
            background-color: rgba(236, 72, 153, 0.1);
        }
    </style>
</head>
<body class="dark transition-colors duration-200 font-sans min-h-screen pb-12">

    <!-- TOP NAVIGATION BAR -->
    <header class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center border-b border-gray-300 dark:border-gray-800">
        <button onclick="toggleAdminMode()" class="px-4 py-1.5 bg-gray-700 hover:bg-gray-600 text-white text-xs font-semibold rounded-md transition cursor-pointer">
            ⚙️ Admin Panel
        </button>
        <button onclick="toggleTheme()" class="px-4 py-1.5 bg-yellow-500 text-gray-900 dark:bg-gray-800 dark:text-yellow-400 text-xs font-bold rounded-full border border-yellow-600 dark:border-gray-700 transition cursor-pointer">
            🌓 Light/Dark Mode
        </button>
    </header>

    <!-- MAIN DASHBOARD HEADER -->
    <div class="text-center my-8">
        <h1 class="text-3xl md:text-4xl font-extrabold tracking-wider main-title flex justify-center items-center gap-3">
            🎮 eLite Division League S7 🎮
        </h1>
        <p class="text-xs md:text-sm font-semibold text-custom-muted tracking-widest mt-1 uppercase">
            Official Tournament Hub
        </p>
    </div>

    <!-- MAIN CONTAINER -->
    <main class="max-w-7xl mx-auto px-4 space-y-6">

        <!-- ADMIN CONTROLS INTERFACE BAR -->
        <div id="adminBar" class="hidden admin-glow-bar rounded-lg p-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <span class="bg-pink-600 text-white text-xs font-bold uppercase px-2 py-0.5 rounded animate-pulse">
                    Admin Mode Active
                </span>
                <p class="text-xs text-custom-main">Input scores inside the fixture rows or rename options.</p>
            </div>
            <div class="flex gap-2">
                <button onclick="exportHtmlFile()" class="bg-yellow-500 hover:bg-yellow-400 text-gray-900 font-bold text-xs px-4 py-2 rounded shadow transition cursor-pointer">
                    Export Entire HTML File
                </button>
                <button onclick="exitAdmin()" class="bg-red-600 hover:bg-red-500 text-white font-bold text-xs px-4 py-2 rounded shadow transition cursor-pointer">
                    Exit Admin
                </button>
            </div>
        </div>

        <!-- LIVE REGISTRATION MANAGER -->
        <div id="rosterManager" class="hidden theme-card rounded-xl p-5 shadow-lg">
            <h3 class="text-cyan-600 dark:text-cyan-400 font-bold text-sm mb-4 uppercase tracking-wider">
                📝 Live Registration Manager
            </h3>
            <div id="rosterInputsGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3"></div>
            <div class="mt-4 flex justify-end">
                <button onclick="saveRosterNames()" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold px-5 py-2 rounded shadow transition">
                    Save Registered Names
                </button>
            </div>
        </div>

        <!-- MAIN HUB GRID LAYOUT -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- STANDINGS TABLE -->
            <div class="lg:col-span-7 theme-card rounded-xl p-5 shadow-xl overflow-hidden">
                <h2 class="main-title font-black text-sm uppercase tracking-wider mb-4">
                    📊 Live Table Standings
                </h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse text-xs md:text-sm">
                        <thead>
                            <tr class="border-b border-gray-300 dark:border-gray-700 text-custom-muted font-bold uppercase tracking-wider">
                                <th class="py-3 px-2 text-center w-10">Pos</th>
                                <th class="py-3 px-3">Player Name</th>
                                <th class="py-3 px-1.5 text-center w-8">P</th>
                                <th class="py-3 px-1.5 text-center w-8">W</th>
                                <th class="py-3 px-1.5 text-center w-8">D</th>
                                <th class="py-3 px-1.5 text-center w-8">L</th>
                                <th class="py-3 px-1.5 text-center w-10 text-cyan-500">GS</th>
                                <th class="py-3 px-1.5 text-center w-10 text-orange-500">GC</th>
                                <th class="py-3 px-1.5 text-center w-10">GD</th>
                                <th class="py-3 px-2 text-center w-12 text-green-400 font-black">Pts</th>
                            </tr>
                        </thead>
                        <tbody id="standingsTableBody" class="divide-y divide-gray-200 dark:divide-gray-800"></tbody>
                    </table>
                </div>
            </div>

            <!-- FIXTURES AND SCHEDULE -->
            <div class="lg:col-span-5 theme-card rounded-xl p-5 shadow-xl flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lime-400 font-black text-sm uppercase tracking-wider">
                        📅 Schedule & Fixtures
                    </h2>
                    <select id="matchdaySelect" onchange="changeMatchday(this.value)" class="bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 text-xs rounded px-2 py-1 font-bold text-gray-900 dark:text-white focus:outline-none"></select>
                </div>

                <div id="fixturesList" class="space-y-3 flex-1 overflow-y-auto max-h-[500px] pr-1"></div>

                <div id="saveScoresContainer" class="hidden mt-4 pt-3 border-t border-gray-200 dark:border-gray-800">
                    <button onclick="saveMatchdayScores()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-xs py-2.5 rounded shadow transition uppercase tracking-wider">
                        Save Matchday Scores
                    </button>
                </div>
            </div>

        </div>
    </main>

    <!-- PROFILES MODAL -->
    <div id="profileModal" class="hidden fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex justify-center items-center p-4">
        <div class="theme-card rounded-xl max-w-md w-full p-6 relative shadow-2xl">
            <button onclick="closeModal()" class="absolute top-3 right-3 text-custom-muted hover:text-red-500 text-lg font-bold">&times;</button>
            <h3 id="modalPlayerName" class="text-xl font-black main-title mb-1">Player Profile</h3>
            <p id="modalTitlesText" class="text-xs mt-3 font-semibold bg-gray-100 dark:bg-gray-900/50 p-3 rounded-lg text-custom-main"></p>
        </div>
    </div>

    <!-- SCRIPT INFRASTRUCTURE -->
    <script>
        /* --- STATE_SNAPSHOT_START --- */
        let players = [
            { id: 1, name: "Siv Sunar", p: 0, w: 0, d: 0, l: 0, gs: 0, gc: 0, gd: 0, pts: 0, titles: "🏆 No previous league titles" },
            { id: 2, name: "Subash Tamang", p: 0, w: 0, d: 0, l: 0, gs: 0, gc: 0, gd: 0, pts: 0, titles: "🏆 Season 5 Champion" },
            { id: 3, name: "Namsang Subba", p: 0, w: 0, d: 0, l: 0, gs: 0, gc: 0, gd: 0, pts: 0, titles: "🏆 No previous league titles" },
            { id: 4, name: "बसन्त तामाङ", p: 0, w: 0, d: 0, l: 0, gs: 0, gc: 0, gd: 0, pts: 0, titles: "🏆 No previous league titles" }, 
            { id: 5, name: "Binaya Shrestha", p: 0, w: 0, d: 0, l: 0, gs: 0, gc: 0, gd: 0, pts: 0, titles: "🏆 No previous league titles" },
            { id: 6, name: "Amax Hood", p: 0, w: 0, d: 0, l: 0, gs: 0, gc: 0, gd: 0, pts: 0, titles: "🏆 No previous league titles" },
            { id: 7, name: "Hab Il", p: 0, w: 0, d: 0, l: 0, gs: 0, gc: 0, gd: 0, pts: 0, titles: "🏆 No previous league titles" },
            { id: 8, name: "Manjil Crestha", p: 0, w: 0, d: 0, l: 0, gs: 0, gc: 0, gd: 0, pts: 0, titles: "🏆 Season 3 Champion" },
            { id: 9, name: "Manish Jimbaa Tamang", p: 0, w: 0, d: 0, l: 0, gs: 0, gc: 0, gd: 0, pts: 0, titles: "🏆 No previous league titles" },
            { id: 10, name: "Smile Xettri", p: 0, w: 0, d: 0, l: 0, gs: 0, gc: 0, gd: 0, pts: 0, titles: "🏆 No previous league titles" }
        ];
        let fixtures = null;
        let currentMatchday = 1;
        /* --- STATE_SNAPSHOT_END --- */

        let isAdminActive = false;

        function initFixtures() {
            if (fixtures !== null && Object.keys(fixtures).length > 0) return;
            fixtures = {};
            let numPlayers = players.length;
            let totalMatchdays = numPlayers - 1;
            let matchesPerDay = numPlayers / 2;
            let tempPlayers = players.map(p => p.id);

            for (let day = 1; day <= totalMatchdays; day++) {
                fixtures[day] = [];
                for (let i = 0; i < matchesPerDay; i++) {
                    fixtures[day].push({
                        homeId: tempPlayers[i],
                        awayId: tempPlayers[numPlayers - 1 - i],
                        homeScore: null,
                        awayScore: null
                    });
                }
                tempPlayers.splice(1, 0, tempPlayers.pop());
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            initFixtures();
            buildMatchdayDropdown();
            renderRosterInputs();
            calculateAndRenderHub();
        });

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            document.body.classList.toggle('dark');
        }

        function buildMatchdayDropdown() {
            const select = document.getElementById('matchdaySelect');
            select.innerHTML = '';
            for (let m = 1; m <= players.length - 1; m++) {
                let opt = document.createElement('option');
                opt.value = m; opt.innerText = `Matchday ${m}`;
                select.appendChild(opt);
            }
            select.value = currentMatchday;
        }

        function changeMatchday(val) {
            currentMatchday = parseInt(val);
            renderFixturesList();
        }

        function toggleAdminMode() {
            if (isAdminActive) { exitAdmin(); return; }
            if (prompt("Enter credential security key:") === "edn2026") {
                isAdminActive = true;
                document.getElementById('adminBar').classList.remove('hidden');
                document.getElementById('rosterManager').classList.remove('hidden');
                document.getElementById('saveScoresContainer').classList.remove('hidden');
                renderFixturesList();
            }
        }

        function exitAdmin() {
            isAdminActive = false;
            document.getElementById('adminBar').classList.add('hidden');
            document.getElementById('rosterManager').classList.add('hidden');
            document.getElementById('saveScoresContainer').classList.add('hidden');
            renderFixturesList();
        }

        function renderRosterInputs() {
            const container = document.getElementById('rosterInputsGrid');
            container.innerHTML = '';
            players.forEach(p => {
                let d = document.createElement('div');
                d.className = 'flex items-center gap-2 bg-gray-100 dark:bg-gray-900/40 border border-gray-300 dark:border-gray-800 rounded p-1';
                d.innerHTML = `<span class="text-[10px] text-custom-muted font-bold w-6">ID${p.id}</span>
                               <input type="text" id="rosterInput-${p.id}" value="${p.name}" class="w-full bg-white dark:bg-gray-800 text-xs px-2 py-1 rounded text-gray-900 dark:text-white border border-gray-300 dark:border-transparent">`;
                container.appendChild(d);
            });
        }

        function saveRosterNames() {
            players.forEach(p => {
                let v = document.getElementById(`rosterInput-${p.id}`).value.trim();
                if (v !== "") p.name = v;
            });
            calculateAndRenderHub();
            alert("Roster updated!");
        }

        function calculateAndRenderHub() {
            players.forEach(p => { p.p = 0; p.w = 0; p.d = 0; p.l = 0; p.gs = 0; p.gc = 0; p.gd = 0; p.pts = 0; });

            Object.keys(fixtures).forEach(day => {
                fixtures[day].forEach(m => {
                    if (m.homeScore !== null && m.awayScore !== null) {
                        let h = players.find(p => p.id === m.homeId);
                        let a = players.find(p => p.id === m.awayId);
                        if (h && a) {
                            h.p++; a.p++;
                            let hs = parseInt(m.homeScore), as = parseInt(m.awayScore);
                            h.gs += hs; h.gc += as; h.gd += (hs - as);
                            a.gs += as; a.gc += hs; a.gd += (as - hs);
                            if (hs > as) { h.w++; h.pts += 3; a.l++; }
                            else if (hs < as) { a.w++; a.pts += 3; h.l++; }
                            else { h.d++; h.pts += 1; a.d++; a.pts += 1; }
                        }
                    }
                });
            });

            let sorted = [...players].sort((x, y) => y.pts - x.pts || y.gd - x.gd || y.gs - x.gs || y.w - x.w);
            const tbody = document.getElementById('standingsTableBody');
            tbody.innerHTML = '';

            sorted.forEach((p, idx) => {
                let tr = document.createElement('tr');
                tr.className = "hover:bg-gray-200/40 dark:hover:bg-gray-800/30 transition cursor-pointer font-medium";
                tr.onclick = () => {
                    document.getElementById('modalPlayerName').innerText = p.name;
                    document.getElementById('modalTitlesText').innerText = p.titles;
                    document.getElementById('profileModal').classList.remove('hidden');
                };
                tr.innerHTML = `
                    <td class="py-3 px-2 text-center font-bold text-custom-muted">${idx + 1}</td>
                    <td class="py-3 px-3 font-semibold text-custom-main truncate max-w-[120px]">${p.name}</td>
                    <td class="py-3 px-1.5 text-center text-custom-muted">${p.p}</td>
                    <td class="py-3 px-1.5 text-center text-custom-muted">${p.w}</td>
                    <td class="py-3 px-1.5 text-center text-custom-muted">${p.d}</td>
                    <td class="py-3 px-1.5 text-center text-custom-muted">${p.l}</td>
                    <td class="py-3 px-1.5 text-center font-bold text-cyan-500">${p.gs}</td>
                    <td class="py-3 px-1.5 text-center font-bold text-orange-500">${p.gc}</td>
                    <td class="py-3 px-1.5 text-center ${p.gd > 0 ? 'text-blue-500 font-bold' : p.gd < 0 ? 'text-red-500 font-bold' : 'text-custom-muted'}">${p.gd > 0 ? '+' + p.gd : p.gd}</td>
                    <td class="py-3 px-2 text-center text-green-500 dark:text-green-400 font-extrabold text-base">${p.pts}</td>`;
                tbody.appendChild(tr);
            });
            renderFixturesList();
        }

        function renderFixturesList() {
            const container = document.getElementById('fixturesList');
            container.innerHTML = '';
            (fixtures[currentMatchday] || []).forEach((m, idx) => {
                let hName = players.find(p => p.id === m.homeId)?.name || `ID ${m.homeId}`;
                let aName = players.find(p => p.id === m.awayId)?.name || `ID ${m.awayId}`;
                let row = document.createElement('div');
                row.className = "flex items-center justify-between p-3 fixture-row rounded-lg shadow-sm text-xs md:text-sm font-semibold";

                if (isAdminActive) {
                    row.innerHTML = `
                        <div class="w-[40%] text-left truncate text-custom-main">${hName}</div>
                        <div class="flex items-center gap-1 justify-center w-[20%]">
                            <input type="number" value="${m.homeScore !== null ? m.homeScore : ''}" id="scoreHome-${idx}" class="w-9 text-center bg-white dark:bg-gray-800 text-gray-900 dark:text-white rounded border border-pink-500 font-bold focus:outline-none">
                            <span class="text-custom-muted">-</span>
                            <input type="number" value="${m.awayScore !== null ? m.awayScore : ''}" id="scoreAway-${idx}" class="w-9 text-center bg-white dark:bg-gray-800 text-gray-900 dark:text-white rounded border border-pink-500 font-bold focus:outline-none">
                        </div>
                        <div class="w-[40%] text-right truncate text-custom-main">${aName}</div>`;
                } else {
                    let played = m.homeScore !== null && m.awayScore !== null;
                    let badge = played ? `<span class="bg-gray-200 dark:bg-gray-800 px-2 py-0.5 rounded text-yellow-500 font-extrabold tracking-wider border border-gray-300 dark:border-gray-700">${m.homeScore} - ${m.awayScore}</span>` : `<span class="vs-badge px-2.5 py-0.5 rounded text-[10px] font-black">VS</span>`;
                    row.innerHTML = `<div class="w-[40%] text-left truncate text-custom-main">${hName}</div>
                                     <div class="w-[20%] text-center flex justify-center">${badge}</div>
                                     <div class="w-[40%] text-right truncate text-custom-main">${aName}</div>`;
                }
                container.appendChild(row);
            });
        }

        function saveMatchdayScores() {
            (fixtures[currentMatchday] || []).forEach((m, idx) => {
                let h = document.getElementById(`scoreHome-${idx}`).value;
                let a = document.getElementById(`scoreAway-${idx}`).value;
                if (h.trim() !== "" && a.trim() !== "") { m.homeScore = parseInt(h); m.awayScore = parseInt(a); }
                else { m.homeScore = null; m.awayScore = null; }
            });
            calculateAndRenderHub();
            alert("Scores saved!");
        }

        function closeModal() { document.getElementById('profileModal').classList.add('hidden'); }

        function exportHtmlFile() {
            let out = document.documentElement.outerHTML
                .replace('id="adminBar" class="', 'id="adminBar" class="hidden ')
                .replace('id="rosterManager" class="', 'id="rosterManager" class="hidden ')
                .replace('id="saveScoresContainer" class="', 'id="saveScoresContainer" class="hidden ');
            let snap = `/* --- STATE_SNAPSHOT_START --- */\n        let players = ${JSON.stringify(players, null, 12)};\n        let fixtures = ${JSON.stringify(fixtures, null, 12)};\n        let currentMatchday = ${currentMatchday};\n        /* --- STATE_SNAPSHOT_END --- */`;
            let finalDoc = out.replace(/\/\* --- STATE_SNAPSHOT_START --- \*\/[\s\S]*?\/\* --- STATE_SNAPSHOT_END --- \*\//, snap);
            let blob = new Blob(["<!DOCTYPE html>\n" + finalDoc], { type: "text/html;charset=utf-8" });
            let a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "index.html"; a.click();
        }
    </script>
</body>
</html>
